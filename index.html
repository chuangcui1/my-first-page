<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>个人简介 | 你的名字</title>
    <style>
      :root {
        --bg: #0b1220;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.09);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.66);
        --line: rgba(255, 255, 255, 0.14);
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        --radius: 18px;
        --a: #6ee7ff;
        --b: #a78bfa;
        --c: #34d399;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --surface: rgba(0, 0, 0, 0.04);
          --surface-2: rgba(0, 0, 0, 0.06);
          --text: rgba(0, 0, 0, 0.88);
          --muted: rgba(0, 0, 0, 0.62);
          --line: rgba(0, 0, 0, 0.12);
          --shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial,
          "Noto Sans CJK SC", "Noto Sans", sans-serif;
        color: var(--text);
        background: radial-gradient(1100px 700px at 15% 10%, rgba(110, 231, 255, 0.35), transparent 60%),
          radial-gradient(900px 600px at 85% 20%, rgba(167, 139, 250, 0.32), transparent 55%),
          radial-gradient(900px 700px at 60% 95%, rgba(52, 211, 153, 0.25), transparent 55%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 40%),
          var(--bg);
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid rgba(110, 231, 255, 0.55);
        outline-offset: 3px;
        border-radius: 12px;
      }

      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 56px 18px;
      }

      .card {
        width: min(920px, 100%);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.05));
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        overflow: hidden;
      }

      .top {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
        padding: 28px;
      }

      @media (max-width: 780px) {
        .top {
          grid-template-columns: 1fr;
        }
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 999px;
        width: fit-content;
        color: var(--muted);
        font-size: 13px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--a), var(--b));
        box-shadow: 0 0 0 4px rgba(110, 231, 255, 0.12);
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(30px, 4vw, 44px);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.65;
      }

      .skills {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tag {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 14px;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .contact {
        display: grid;
        gap: 10px;
      }

      .contact a,
      .contact span {
        display: grid;
        grid-template-columns: 22px 1fr;
        gap: 10px;
        align-items: center;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .contact a:hover {
        background: var(--surface-2);
      }

      .icon {
        width: 22px;
        height: 22px;
        opacity: 0.9;
      }

      .footer {
        padding: 14px 18px;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .pill {
        border: 1px solid var(--line);
        background: var(--surface);
        padding: 8px 10px;
        border-radius: 999px;
        white-space: nowrap;
      }

      .grad {
        background: linear-gradient(135deg, var(--a), var(--b) 55%, var(--c));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <article class="card" aria-label="个人简介卡片">
        <section class="top">
          <div>
            <div class="badge" aria-label="状态">
              <span class="dot" aria-hidden="true"></span>
              <span>你好，我是</span>
            </div>

            <h1><span class="grad">小花</span></h1>
            <p class="subtitle">
              一句话介绍：专注把复杂事情做简单，热爱产品与工程的交汇点。
            </p>

            <div class="skills" aria-label="技能标签">
              <span class="tag">HTML/CSS</span>
              <span class="tag">JavaScript</span>
              <span class="tag">TypeScript</span>
              <span class="tag">React</span>
              <span class="tag">Node.js</span>
              <span class="tag">UI/UX</span>
            </div>
          </div>

          <aside class="panel" aria-label="联系方式">
            <h2>Contact</h2>
            <div class="contact">
              <a href="mailto:111@111.com" aria-label="发送邮件">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M4.5 7.5v9A2.5 2.5 0 0 0 7 19h10a2.5 2.5 0 0 0 2.5-2.5v-9A2.5 2.5 0 0 0 17 5H7a2.5 2.5 0 0 0-2.5 2.5Z"
                    stroke="currentColor"
                    stroke-width="1.6"
                  />
                  <path
                    d="m6.5 8 5.1 4.1a1 1 0 0 0 1.25 0L18 8"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <span>111@111.com</span>
              </a>

              <a href="https://github.com/111" target="_blank" rel="noreferrer" aria-label="访问 GitHub">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M9 19c-4 1.2-4-2-5-2m10 4v-3.3c0-.9.3-1.6.8-2-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0C18.6 2.9 19.6 3.2 19.6 3.2c.7 1.6.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.7-2.8 5.7-5.5 6 .5.5.9 1.3.9 2.6V21"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <span>github.com/111</span>
              </a>

              <span aria-label="所在地" style="white-space: nowrap">
                <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M12 21s7-5 7-11a7 7 0 1 0-14 0c0 6 7 11 7 11Z"
                    stroke="currentColor"
                    stroke-width="1.6"
                  />
                  <path
                    d="M12 12.2a2.2 2.2 0 1 0 0-4.4 2.2 2.2 0 0 0 0 4.4Z"
                    stroke="currentColor"
                    stroke-width="1.6"
                  />
                </svg>
                <span>杭州 · 中国</span>
              </span>
            </div>
          </aside>
        </section>

        <footer class="footer">
          <span>© <span id="y">2026</span> 小花</span>
          <span class="pill">可用性优先 · 轻量 · 无外部依赖</span>
        </footer>
      </article>
    </main>

    <script>
      document.getElementById("y").textContent = String(new Date().getFullYear());
    </script>
  </body>
</html>
